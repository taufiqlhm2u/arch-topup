<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LapakGaming - Marketplace Game Modern</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body class="text-gray-900">

    <!-- Header / Navbar -->
    <header class="sticky top-0 z-50 bg-white border-b border-gray-100 shadow-sm">
        <div class="container mx-auto px-4 py-3 flex items-center justify-between gap-4">
            <!-- Logo -->
            <div class="flex-shrink-0">
                <a href="#" class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                        </svg>
                    </div>
                    <span class="font-bold text-xl tracking-tight hidden sm:block">LAPAKGAMING</span>
                </a>
            </div>

            <!-- Search Bar -->
            <div class="flex-1 max-w-2xl relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </div>
                <input type="text" placeholder="Cari Game..."
                    class="block w-full pl-10 pr-3 py-2 bg-gray-50 border border-gray-200 rounded-full leading-5 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white text-sm transition-all duration-200">
            </div>

            <!-- Login Button -->
            <div class="flex-shrink-0">
                <button
                    class="px-5 py-2 text-sm font-semibold text-blue-600 border border-blue-600 rounded-full hover:bg-blue-50 transition-colors">
                    Masuk
                </button>
            </div>
        </div>
    </header>

    <!-- Content Wrapper -->
    <main class="container mx-auto px-4 py-6">

        <!-- Filter Section -->
        <section class="mb-8 overflow-hidden">
            <div class="flex items-center gap-2 overflow-x-auto hide-scrollbar pb-2">
                <button
                    class="flex-shrink-0 px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-full shadow-sm">
                    🔥 Lagi Populer
                </button>
                <button
                    class="flex-shrink-0 px-4 py-2 bg-gray-100 text-gray-600 text-sm font-medium rounded-full hover:bg-gray-200 transition-colors">
                    Top Up Langsung
                </button>
                <button
                    class="flex-shrink-0 px-4 py-2 bg-gray-100 text-gray-600 text-sm font-medium rounded-full hover:bg-gray-200 transition-colors">
                    🌟 Baru Rilis
                </button>
                <button
                    class="flex-shrink-0 px-4 py-2 bg-gray-100 text-gray-600 text-sm font-medium rounded-full hover:bg-gray-200 transition-colors">
                    Top Up Login
                </button>
                <button
                    class="flex-shrink-0 px-4 py-2 bg-gray-100 text-gray-600 text-sm font-medium rounded-full hover:bg-gray-200 transition-colors">
                    Voucher
                </button>
                <button
                    class="flex-shrink-0 px-4 py-2 bg-gray-100 text-gray-600 text-sm font-medium rounded-full hover:bg-gray-200 transition-colors">
                    Pulsa
                </button>
                <button
                    class="flex-shrink-0 px-4 py-2 bg-gray-100 text-gray-600 text-sm font-medium rounded-full hover:bg-gray-200 transition-colors">
                    Entertainment
                </button>
            </div>
        </section>

        <!-- Game Cards Grid -->
        <section>
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 lg:gap-6">

                <!-- Game Card: Mobile Legends -->
                <div
                    class="group relative bg-white border border-gray-100 rounded-2xl overflow-hidden shadow-sm card-hover transition-all duration-300">
                    <div class="aspect-square bg-gray-200 relative overflow-hidden">
                        <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&q=80&w=400"
                            alt="Mobile Legends" class="w-full h-full object-cover">
                        <div
                            class="absolute top-2 left-2 px-2 py-0.5 bg-red-500 text-white text-[10px] font-bold rounded-md">
                            CASHBACK
                        </div>
                    </div>
                    <div class="p-3">
                        <h3 class="font-semibold text-sm text-gray-900 group-hover:text-blue-600 transition-colors">
                            Mobile Legends</h3>
                    </div>
                </div>

                <!-- Game Card: Free Fire -->
                <div
                    class="group relative bg-white border border-gray-100 rounded-2xl overflow-hidden shadow-sm card-hover transition-all duration-300">
                    <div class="aspect-square bg-gray-200 relative overflow-hidden">
                        <img src="https://images.unsplash.com/photo-1552824236-07764bdc2957?auto=format&fit=crop&q=80&w=400"
                            alt="Free Fire" class="w-full h-full object-cover">
                        <div
                            class="absolute top-2 left-2 px-2 py-0.5 bg-red-500 text-white text-[10px] font-bold rounded-md">
                            POPULER
                        </div>
                    </div>
                    <div class="p-3">
                        <h3 class="font-semibold text-sm text-gray-900 group-hover:text-blue-600 transition-colors">Free
                            Fire</h3>
                    </div>
                </div>

                <!-- Game Card: Resident Evil -->
                <div
                    class="group relative bg-white border border-gray-100 rounded-2xl overflow-hidden shadow-sm card-hover transition-all duration-300">
                    <div class="aspect-square bg-gray-200 relative overflow-hidden">
                        <img src="https://images.unsplash.com/photo-1612287230202-1ff1d85d1bdf?auto=format&fit=crop&q=80&w=400"
                            alt="Resident Evil" class="w-full h-full object-cover">
                    </div>
                    <div class="p-3">
                        <h3 class="font-semibold text-sm text-gray-900 group-hover:text-blue-600 transition-colors">
                            Resident Evil</h3>
                    </div>
                </div>

                <!-- Game Card: Monster Hunter -->
                <div
                    class="group relative bg-white border border-gray-100 rounded-2xl overflow-hidden shadow-sm card-hover transition-all duration-300">
                    <div class="aspect-square bg-gray-200 relative overflow-hidden">
                        <img src="https://images.unsplash.com/photo-1605898960710-9aa68589c366?auto=format&fit=crop&q=80&w=400"
                            alt="Monster Hunter" class="w-full h-full object-cover">
                    </div>
                    <div class="p-3">
                        <h3 class="font-semibold text-sm text-gray-900 group-hover:text-blue-600 transition-colors">
                            Monster Hunter</h3>
                    </div>
                </div>

                <!-- Game Card: Bigo Live -->
                <div
                    class="group relative bg-white border border-gray-100 rounded-2xl overflow-hidden shadow-sm card-hover transition-all duration-300">
                    <div class="aspect-square bg-gray-200 relative overflow-hidden flex items-center justify-center">
                        <svg class="w-16 h-16 text-blue-400 opacity-50" fill="currentColor" viewBox="0 0 24 24">
                            <path
                                d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z" />
                            <path
                                d="M12 6c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm0 10c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4z" />
                        </svg>
                    </div>
                    <div class="p-3">
                        <h3 class="font-semibold text-sm text-gray-900 group-hover:text-blue-600 transition-colors">Bigo
                            Live</h3>
                    </div>
                </div>

                <!-- Game Card Placeholder 1 -->
                <div
                    class="group relative bg-white border border-gray-100 rounded-2xl overflow-hidden shadow-sm card-hover transition-all duration-300">
                    <div class="aspect-square bg-gray-100 relative overflow-hidden">
                        <img src="https://images.unsplash.com/photo-1542751110-97427bbecf20?auto=format&fit=crop&q=80&w=400"
                            alt="Game Placeholder" class="w-full h-full object-cover">
                    </div>
                    <div class="p-3">
                        <h3 class="font-semibold text-sm text-gray-900 group-hover:text-blue-600 transition-colors">
                            Genshin Impact</h3>
                    </div>
                </div>

                <!-- Game Card Placeholder 2 -->
                <div
                    class="group relative bg-white border border-gray-100 rounded-2xl overflow-hidden shadow-sm card-hover transition-all duration-300">
                    <div class="aspect-square bg-gray-100 relative overflow-hidden">
                        <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?auto=format&fit=crop&q=80&w=400"
                            alt="Game Placeholder" class="w-full h-full object-cover">
                    </div>
                    <div class="p-3">
                        <h3 class="font-semibold text-sm text-gray-900 group-hover:text-blue-600 transition-colors">PUBG
                            Mobile</h3>
                    </div>
                </div>

                <!-- Game Card Placeholder 3 -->
                <div
                    class="group relative bg-white border border-gray-100 rounded-2xl overflow-hidden shadow-sm card-hover transition-all duration-300">
                    <div class="aspect-square bg-gray-100 relative overflow-hidden">
                        <img src="https://images.unsplash.com/photo-1580234811497-9bd7fd0f56ef?auto=format&fit=crop&q=80&w=400"
                            alt="Game Placeholder" class="w-full h-full object-cover">
                    </div>
                    <div class="p-3">
                        <h3 class="font-semibold text-sm text-gray-900 group-hover:text-blue-600 transition-colors">
                            Valorant</h3>
                    </div>
                </div>

                <!-- Game Card Placeholder 4 -->
                <div
                    class="group relative bg-white border border-gray-100 rounded-2xl overflow-hidden shadow-sm card-hover transition-all duration-300">
                    <div class="aspect-square bg-gray-100 relative overflow-hidden">
                        <img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&q=80&w=400"
                            alt="Game Placeholder" class="w-full h-full object-cover">
                    </div>
                    <div class="p-3">
                        <h3 class="font-semibold text-sm text-gray-900 group-hover:text-blue-600 transition-colors">
                            Steam Wallet</h3>
                    </div>
                </div>

                <!-- Game Card Placeholder 5 -->
                <div
                    class="group relative bg-white border border-gray-100 rounded-2xl overflow-hidden shadow-sm card-hover transition-all duration-300">
                    <div class="aspect-square bg-gray-100 relative overflow-hidden">
                        <img src="https://images.unsplash.com/photo-1614027164847-1b280927e8eb?auto=format&fit=crop&q=80&w=400"
                            alt="Game Placeholder" class="w-full h-full object-cover">
                    </div>
                    <div class="p-3">
                        <h3 class="font-semibold text-sm text-gray-900 group-hover:text-blue-600 transition-colors">
                            PlayStation Network</h3>
                    </div>
                </div>

            </div>
        </section>

    </main>

</body>

</html>
